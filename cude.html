<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Cube</title>
<style>
body {
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 立方体容器 */
.cube {
    position: relative;
    width: 150px;
    height: 150px;
}

/* 正面 */
.front {
    position: absolute;
    width: 150px;
    height: 150px;
    background: linear-gradient(to bottom right, #4facfe, #00f2fe);
}

/* 顶面 */
.top {
    position: absolute;
    width: 150px;
    height: 150px;
    background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
    transform: skewX(-45deg) translateY(-75px);
    transform-origin: bottom;
}

/* 侧面 */
.side {
    position: absolute;
    width: 150px;
    height: 150px;
    background: linear-gradient(to right, #43e97b, #38f9d7);
    transform: skewY(-45deg) translateX(75px);
    transform-origin: left;
}
</style>
</head>
<body>

<div class="cube">
    <div class="top"></div>
    <div class="side"></div>
    <div class="front"></div>
</div>

</body>
</html>
