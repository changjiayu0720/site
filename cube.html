<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多彩渐变严丝合缝立体正方体</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050510; /* 稍微加深背景色以突出多彩的立方体 */
            overflow: hidden;
            perspective: 1800px;
        }

        .cube {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            /* 保持缓慢旋转动画 */
            animation: rotateCube 25s linear infinite;
        }

        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            /* 关键点 1：边框向内计算，保证严丝合缝 */
            box-sizing: border-box; 
            border: 2px solid rgba(255, 255, 255, 0.5); /* 稍微加亮边框 */
            box-shadow: 
                inset 0 0 50px rgba(0,0,0,0.3), /* 内部阴影增加立体感 */
                0 10px 40px rgba(0, 0, 0, 0.7); /* 外部投影 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- 每个面使用两种截然不同的颜色渐变 --- */

        /* 正面: 鲜艳蓝 -> 极光绿 */
        .front { 
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); 
            transform: translateZ(100px); 
        }

        /* 背面: 深邃紫 -> 魅惑红 */
        .back { 
            background: linear-gradient(135deg, #b8cbb8 0%, #b8cbb8 0%, #b465da 0%, #cf6cc9 33%, #ee609c 66%, #ee609c 100%); /* 复杂多色渐变，效果类似 */
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); /* 简化的双色：蓝紫 */
            background: linear-gradient(135deg, #8120d3 0%, #f87171 100%); /* 正确的双色：深紫 -> 红 */
            transform: rotateY(180deg) translateZ(100px); 
        }

        /* 右侧: 活力橙 -> 烈焰红 */
        .right { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); /* 调整为：橙 -> 红 */
            background: linear-gradient(135deg, #ff9e22 0%, #ff3d00 100%); 
            transform: rotateY(90deg) translateZ(100px); 
        }

        /* 左侧: 青草绿 -> 柠檬黄 */
        .left { 
            background: linear-gradient(135deg, #96fbc4 0%, #f9f586 100%); 
            transform: rotateY(-90deg) translateZ(100px); 
        }

        /* 顶面: 霓虹粉 -> 亮青色 */
        .top { 
            background: linear-gradient(135deg, #ff00c1 0%, #00fff9 100%); 
            transform: rotateX(90deg) translateZ(100px); 
        }

        /* 底面: 宝石蓝 -> 魅惑紫 */
        .bottom { 
            background: linear-gradient(135deg, #1e3c72 0%, #1e3c72 1%, #2a5298 100%); /* 调整为更明显的双色 */
            background: linear-gradient(135deg, #0575e6 0%, #89fffd 100%); /* 调整为：深蓝 -> 亮蓝 */
            background: linear-gradient(135deg, #1d4ed8 0%, #a855f7 100%); /* 正确的双色：蓝 -> 紫 */
            transform: rotateX(-90deg) translateZ(100px); 
        }

        /* --- 动画部分 --- */
        @keyframes rotateCube {
            from { transform: rotateX(-22deg) rotateY(0deg); }
            to   { transform: rotateX(-22deg) rotateY(360deg); }
        }

        .cube:hover {
            animation-play-state: paused; /* 鼠标悬停时暂停 */
        }
    </style>
</head>
<body>

    <div class="cube">
        <div class="face front">正面</div>
        <div class="face back">背面</div>
        <div class="face right">右侧</div>
        <div class="face left">左侧</div>
        <div class="face top">顶面</div>
        <div class="face bottom">底面</div>
    </div>

</body>
</html>
