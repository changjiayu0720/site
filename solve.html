<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower of Hanoi - 3D Learning Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <header>
      <h1>Tower of Hanoi · 3D Learning Game</h1>
      <p class="subtitle">Web Design Course Project (HTML + CSS + JS)</p >
      
      <div class="controls">
        <div class="control-group">
          <label for="disk-slider">盘子数量: <span id="disk-count-val">5</span></label>
          <input type="range" id="disk-slider" min="3" max="8" value="5">
        </div>
        
        <div class="button-group">
          <button id="reset-btn">重置游戏</button>
          <button id="auto-solve-btn">自动演示</button>
        </div>

        <div class="stats">
          <span>移动步数: <strong id="move-count">0</strong></span>
        </div>
      </div>
    </header>

    <main class="game-board">
      <div class="peg" id="peg-0" data-index="0">
        <div class="peg-shaft"></div>
        <div class="disks-container"></div>
        <div class="peg-base">Peg A</div>
      </div>
      <div class="peg" id="peg-1" data-index="1">
        <div class="peg-shaft"></div>
        <div class="disks-container"></div>
        <div class="peg-base">Peg B</div>
      </div>
      <div class="peg" id="peg-2" data-index="2">
        <div class="peg-shaft"></div>
        <div class="disks-container"></div>
        <div class="peg-base">Peg C</div>
      </div>
    </main>

    <div id="message-area" class="hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
